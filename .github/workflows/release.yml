name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore src/WorkTracking.slnx

      - name: Test
        run: dotnet test src/WorkTracking.slnx --configuration Release --no-restore

      - name: Publish
        run: >
          dotnet publish src/WorkTracking.UI/WorkTracking.UI.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}
          --output publish/

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Pack installer
        run: >
          vpk pack
          --packId Billable
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir publish/
          --mainExe billable.exe
          --icon src/WorkTracking.UI/app.ico
          --outputDir installer/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Billable-win-Setup.exe
            installer/releases.win.json
          generate_release_notes: true
          fail_on_unmatched_files: true
